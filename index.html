<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIN EXAM MOD</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141418;
            --text-main: #e0e0e0;
            --text-muted: #6b6b76;
            --accent: #008cff;
            --border: #22222a;
            --danger: #ff3366;
            --success: #00e676;
            --warning-bg: rgba(255, 51, 102, 0.08);
            --warning-border: rgba(255, 51, 102, 0.3);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Anti seleksi HANYA untuk teks (bukan input) agar fitur Paste tetap jalan */
        h2, p, .trace-id-container, .critical-warning, button {
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 35px 25px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 2;
        }

        h2 { margin: 0 0 5px; font-size: 18px; letter-spacing: 1.5px; font-weight: 600; color: #fff; }
        p { color: var(--text-muted); font-size: 12px; margin-bottom: 25px; letter-spacing: 0.5px; }

        input {
            width: 100%; padding: 14px; box-sizing: border-box; background: var(--bg);
            border: 1px solid var(--border); color: var(--text-main); font-family: monospace;
            font-size: 15px; border-radius: 6px; margin-bottom: 20px; text-align: center;
            text-transform: uppercase; transition: all 0.3s; outline: none; letter-spacing: 1px;
            
            /* Memastikan input bisa di-paste dan diklik normal */
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        input::placeholder { color: #444; letter-spacing: normal; }

        button {
            width: 100%; background: var(--accent); color: #fff; border: none; padding: 14px;
            font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer;
            transition: opacity 0.2s; letter-spacing: 1px; text-transform: uppercase;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: translateY(1px); }

        #msgBox { margin-top: 15px; font-size: 12px; font-weight: 500; height: 15px; transition: color 0.3s; }
        .err { color: var(--danger); }
        .succ { color: var(--success); }
        .load { color: var(--text-muted); }

        .trace-id-container { margin-top: 25px; padding-top: 15px; border-top: 1px dashed #333; }
        .trace-id-text { font-family: monospace; font-size: 10px; color: #555; letter-spacing: 1px; }
        .trace-id-value { color: #888; font-weight: bold; }

        .critical-warning {
            margin-top: 15px;
            padding: 12px;
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: 6px;
            font-size: 10px;
            color: #dcdcdc;
            text-align: left;
            line-height: 1.5;
        }

        .critical-warning strong {
            display: block;
            color: var(--danger);
            font-size: 11px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>LOGIN EXAM MOD</h2>
        <p>Akses Terenkripsi</p>
        
        <input type="text" id="keyInput" placeholder="ENTER LICENSE KEY" autocomplete="off" spellcheck="false">
        <button id="btnAuth" onclick="prosesLogin()">AUTHENTICATE</button>
        
        <div id="msgBox"></div>

        <div class="trace-id-container">
            <span class="trace-id-text">SYSTEM TRACE ID: <br><span class="trace-id-value" id="displayHWID">SCANNING...</span></span>
        </div>

        <div class="critical-warning">
            <strong>⚠️ CRITICAL WARNING</strong>
            Dilarang melakukan <i>"Clear Data / Hapus Cache"</i> pada pengaturan aplikasi setelah login. Hal tersebut akan mereset ID Perangkat dan membuat Lisensi Anda hangus permanen!
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            databaseURL: "https://fir-demo-1e3ca-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myHWID = localStorage.getItem("DEVICE_HWID");
        if (!myHWID) {
            myHWID = "DEV-" + Math.random().toString(36).substr(2, 10).toUpperCase();
            localStorage.setItem("DEVICE_HWID", myHWID);
        }

        setTimeout(() => {
            document.getElementById("displayHWID").innerText = myHWID;
        }, 800);

        const msgBox = document.getElementById("msgBox");
        const btnAuth = document.getElementById("btnAuth");

        function showMessage(text, type) {
            msgBox.innerHTML = text; 
            msgBox.className = type;
        }

        function prosesLogin() {
            const inputKey = document.getElementById("keyInput").value.trim().toUpperCase();
            
            if(inputKey === "") {
                showMessage("License Key diperlukan.", "err");
                return;
            }

            btnAuth.textContent = "VERIFYING...";
            btnAuth.disabled = true;
            showMessage("Memeriksa kredensial ke server...", "load");

            const keyRef = db.ref('vip_keys/' + inputKey);

            keyRef.once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();

                    if (data.status === "banned") {
                        showMessage("AKSES DITOLAK. LISENSI DIBLOKIR.", "err");
                        resetButton();
                        return;
                    }

                    if (data.hwid === "") {
                        keyRef.update({ hwid: myHWID }).then(() => {
                            grantAccess("Lisensi berhasil diikat ke perangkat.");
                        });
                    } 
                    else if (data.hwid === myHWID) {
                        grantAccess("Akses diizinkan.");
                    } 
                    else {
                        // PERUBAHAN NAMA ADMIN MINZZ
                        showMessage("LISENSI DIGUNAKAN DI PERANGKAT LAIN! <br><a href='#' style='color:#ff3366; text-decoration:underline;' onclick='alert(\"Harap hubungi Admin MINZZ jika Anda tidak sengaja menghapus data aplikasi.\")'>Hubungi Admin MINZZ</a>", "err");
                        resetButton();
                    }
                } else {
                    showMessage("LICENSE KEY TIDAK VALID/TIDAK DITEMUKAN.", "err");
                    resetButton();
                }
            }).catch((error) => {
                showMessage("Gagal terhubung ke database.", "err");
                resetButton();
            });
        }

        function resetButton() {
            btnAuth.textContent = "AUTHENTICATE";
            btnAuth.disabled = false;
        }

        function grantAccess(msg) {
            showMessage(msg + " Memuat...", "succ");
            btnAuth.textContent = "AUTHORIZED";
            
            setTimeout(() => {
                window.location.href = "minz://sukses";
            }, 1000);
        }
    </script>

</body>
</html>
