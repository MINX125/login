<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIN EXAM MOD</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141418;
            --text-main: #e0e0e0;
            --text-muted: #6b6b76;
            --accent: #008cff;
            --border: #22222a;
            --danger: #ff3366;
            --success: #00e676;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px 30px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            margin: 0 0 5px;
            font-size: 18px;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: #fff;
        }

        p {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-family: monospace;
            font-size: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.3s;
            outline: none;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        input::placeholder {
            color: #444;
            letter-spacing: normal;
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: translateY(1px); }

        #msgBox {
            margin-top: 20px;
            font-size: 12px;
            font-weight: 500;
            height: 15px;
            transition: color 0.3s;
        }

        .err { color: var(--danger); }
        .succ { color: var(--success); }
        .load { color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>LOGIN EXAM MOD</h2>
        <p>Akses Terenkripsi</p>
        
        <input type="text" id="keyInput" placeholder="ENTER LICENSE KEY" autocomplete="off" spellcheck="false">
        <button id="btnAuth" onclick="prosesLogin()">AUTHENTICATE</button>
        
        <div id="msgBox"></div>
    </div>

    <script>
        // 1. CONFIG FIREBASE MENGGUNAKAN LINK BARU
        const firebaseConfig = {
            databaseURL: "https://fir-demo-1e3ca-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. DEVICE BINDING (HWID)
        let myHWID = localStorage.getItem("DEVICE_HWID");
        if (!myHWID) {
            myHWID = "DEV-" + Math.random().toString(36).substr(2, 10).toUpperCase();
            localStorage.setItem("DEVICE_HWID", myHWID);
        }

        // 3. FUNGSI LOGIKA LOGIN
        const msgBox = document.getElementById("msgBox");
        const btnAuth = document.getElementById("btnAuth");

        function showMessage(text, type) {
            msgBox.textContent = text;
            msgBox.className = type;
        }

        function prosesLogin() {
            const inputKey = document.getElementById("keyInput").value.trim().toUpperCase();
            
            if(inputKey === "") {
                showMessage("License Key diperlukan.", "err");
                return;
            }

            // Kunci tombol saat loading
            btnAuth.textContent = "VERIFYING...";
            btnAuth.disabled = true;
            showMessage("Memeriksa kredensial ke server...", "load");

            const keyRef = db.ref('vip_keys/' + inputKey);

            keyRef.once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();

                    if (data.status === "banned") {
                        showMessage("AKSES DITOLAK. LISENSI DIBLOKIR.", "err");
                        resetButton();
                        return;
                    }

                    if (data.hwid === "") {
                        // Kunci ke Device Ini
                        keyRef.update({ hwid: myHWID }).then(() => {
                            grantAccess("Lisensi berhasil diikat ke perangkat.");
                        });
                    } 
                    else if (data.hwid === myHWID) {
                        // HWID Cocok
                        grantAccess("Akses diizinkan.");
                    } 
                    else {
                        // HWID Beda
                        showMessage("LISENSI INI TELAH DIGUNAKAN DI PERANGKAT LAIN.", "err");
                        resetButton();
                    }
                } else {
                    showMessage("LICENSE KEY TIDAK VALID/TIDAK DITEMUKAN.", "err");
                    resetButton();
                }
            }).catch((error) => {
                showMessage("Gagal terhubung ke database.", "err");
                resetButton();
            });
        }

        function resetButton() {
            btnAuth.textContent = "AUTHENTICATE";
            btnAuth.disabled = false;
        }

        // 4. JEMBATAN KE APLIKASI SMALI
        function grantAccess(msg) {
            showMessage(msg + " Memuat...", "succ");
            btnAuth.textContent = "AUTHORIZED";
            
            setTimeout(() => {
                // KIRIM SINYAL RAHASIA KE APK
                // Sinyal ini akan ditangkap oleh LoginClient.smali
                window.location.href = "minz://sukses";
            }, 1000);
        }
    </script>

</body>
</html>
